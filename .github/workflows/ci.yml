name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: worldsim-rpg/worldsim-workspace
          ref: ${{ vars.WORLDSIM_WORKSPACE_REF || 'main' }}
          path: workspace

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install workspace packages
        run: |
          pip install -e workspace/packages/schemas
          pip install -e workspace/packages/prompts

      - name: Install agent
        run: pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
